"$schema" = 'https://starship.rs/config-schema.json'

format = '$all$directory'
right_format = '$git_branch$git_status$git_state$character$cmd_duration$time'

add_newline = false
continuation_prompt = '▶▶ '

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = false
format = '[$time]($style) '

[package]
disabled = true

[line_break]
disabled = true

[character]
success_symbol = '[󰗠](bold green)'
error_symbol = '[󰅙](bold red)'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '

[cmd_duration]
format = '[$duration]($style) '

[git_status]
format = '[($conflicted )($ahead_behind )($stashed )($modified )($staged )($renamed )($deleted )($untracked )]($style)'
style = "bold yellow"
conflicted = "󰞇${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = ">${count}"
deleted = "x${count}"

